
# Rune3DS Light theme — clean, readable light mode with visible controls
# All color codes are standard RGBA (as used by HTML).
# All color codes are optional, if omitted the default (light) color will be used.

author = Rune3DS
name = Rune3DS Light

# Clean off-white background — easier on the eyes than pure white
background_colour = #F2F2F2FF

# Dark text for strong contrast on light backgrounds
text_colour = #1A1A2EFF

# Subtle card-like surface for buttons and panels
button_background_colour = #FFFFFFEE

# Visible border for buttons — a soft mid-gray
button_border_colour = #CCCCCCCC

# Battery indicator — dark fill for high charge
battery_good_colour = #3A3A5CFF

# Battery indicator — clear red for low charge
battery_bad_colour = #FF3B30FF

# Toggle enabled — dark fill
toggle_enabled_colour = #3A3A5CFF

# Toggle disabled — visibly lighter than enabled, distinct from background
toggle_disabled_colour = #D0D0D0FF

# Toggle slider — bright white knob
toggle_slider_colour = #FFFFFFFF

# Progress bar filled — dark fill
progress_bar_foreground_colour = #3A3A5CFF

# Progress bar unfilled — visible light gray, not blending into background
progress_bar_background_colour = #D0D0D0FF

# Scrollbar — dark, visible
scrollbar_colour = #3A3A5CFF

# LED — green for success (alpha ignored by hardware)
led_success = #00FF0000

# LED — red for failure (alpha ignored by hardware)
led_failure = #FF000000

# SMDH icon border — visible mid-gray
smdh_icon_border_colour = #CCCCCCCC

# Checkbox border — visible mid-gray
checkbox_border_colour = #999999FF

# Checkbox check — dark fill
checkbox_check_colour = #3A3A5CFF

# Graph line — dark line visible on light panel
graph_line_colour = #3A3A5CFF

# Warning text — clear red
warning_colour = #FF3B30FF

# Close/dismiss X button — clear red
x_colour = #FF3B30FF

# Battery charging indicator — dark fill
battery_charging_colour = #3A3A5CFF

# Relative from the .cfg file path to your more image, recommended 20x20
more_image = ./default_data/more_light.png

# Relative from the .cfg file path to your more image, recommended 26x16
battery_image = ./default_data/battery_light.png

# Relative from the .cfg file path to your more image, recommended 20x20
search_image = ./default_data/search_light.png

# Relative from the .cfg file path to your more image, recommended 20x20
settings_image = ./default_data/settings_light.png

# Relative from the .cfg file path to your more image, recommended 80x80
spinner_image = ./default_data/spinner_light.png

# Relative from the .cfg file path to your more image, recommended 20x20
random_image = ./default_data/random_light.png

# Relative from the .cfg file path to your more image, recommended 26x16
battery_charging_image = ./default_data/battery_charging_light.png

# Background image for top screen, recommended 400x240, not used in default themes
#background_top_image =

# Background image for bottom screen, recommended 320x240, not used in default themes
#background_bottom_image =
