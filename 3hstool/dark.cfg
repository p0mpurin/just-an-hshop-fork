
# Rune3DS Minimal theme with quiet contrast and neutral surfaces
# All color codes are standard RGBA (as used by HTML).
# All color codes are optional, if omitted the default (light) color will be used.

author = p0mpurin
name = Rune3DS Minimal

# Pure black for OLED - perfect inky blacks on a 3DS display
background_colour = #000000FF

# Warm off-white text for a neutral interface
text_colour = #EDEDEDFF

# Slightly lighter button background for better visual separation
button_background_colour = #111111E8

# Primary accent - soft white for selected borders and highlights
button_border_colour = #FFFFFF66

# Battery indicator - high charge uses the primary accent
battery_good_colour = #EDEDEDFF

# Battery indicator - low charge uses a clear system red
battery_bad_colour = #FF5F57FF

# Toggle switch - enabled state uses clean white
toggle_enabled_colour = #FAFAFAFF

# Toggle switch - disabled state is a warm dark gray for clear off-state visibility
toggle_disabled_colour = #242424FF

# Toggle switch - slider stays pure white for maximum contrast
toggle_slider_colour = #FFFFFFFF

# Progress bar - filled portion uses clean white
progress_bar_foreground_colour = #FAFAFAFF

# Progress bar - unfilled background is a warm dark gray (more depth than before)
progress_bar_background_colour = #222222FF

# Scrollbar - uses the primary neutral accent
scrollbar_colour = #FAFAFAFF

# LED - success uses green (alpha ignored by hardware)
led_success = #00FF0000

# LED - failure uses red (alpha ignored by hardware)
led_failure = #FF000000

# SMDH icon border - matches the primary accent
smdh_icon_border_colour = #FFFFFF66

# Checkbox border - refined to be more visible against the dark background
checkbox_border_colour = #5C5C5CFF

# Checkbox check mark - uses primary accent (unchecked = transparent)
checkbox_check_colour = #FAFAFAFF

# Latency/network graph line - bright neutral line against the dark panel
graph_line_colour = #FAFAFAFF

# Warning text - uses a clear red that stands out
warning_colour = #FF5F57FF

# 'X' close/dismiss buttons - clear red for destructive-action signalling
x_colour = #FF5F57FF

# Battery charging indicator - bright neutral signal when plugged in
battery_charging_colour = #FAFAFAFF

# Relative from the .cfg file path to your more image, recommended 20x20
more_image = ./default_data/more_dark.png

# Relative from the .cfg file path to your more image, recommended 26x16
battery_image = ./default_data/battery_dark.png

# Relative from the .cfg file path to your more image, recommended 20x20
search_image = ./default_data/search_dark.png

# Relative from the .cfg file path to your more image, recommended 20x20
settings_image = ./default_data/settings_dark.png

# Relative from the .cfg file path to your more image, recommended 80x80
spinner_image = ./default_data/spinner_dark.png

# Relative from the .cfg file path to your more image, recommended 20x20
random_image = ./default_data/random_dark.png

# Relative from the .cfg file path to your more image, recommended 26x16
battery_charging_image = ./default_data/battery_charging_dark.png

# Background image for top screen, recommended 400x240
# User backgrounds loaded at runtime from /3ds/Rune3DS/backgrounds
