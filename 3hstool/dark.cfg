
# Refined Nocturne dark theme — v2.0 with improved contrast, warmth, and consistency
# All color codes are standard RGBA (as used by HTML).
# All color codes are optional, if omitted the default (light) color will be used.

author = p0mpurin
name = Nocturne Refined

# Pure black for OLED — perfect inky blacks on a 3DS display
background_colour = #000000FF

# Warm off-white text to harmonize with the pink accent palette
text_colour = #F5F0F2FF

# Slightly lighter button background for better visual separation
button_background_colour = #1A1417BB

# Primary accent — soft pastel pink for selected borders and highlights
button_border_colour = #FFA4CCFF

# Battery indicator — high charge uses the primary accent
battery_good_colour = #FFA4CCFF

# Battery indicator — low charge uses a richer, slightly deeper pink
battery_bad_colour = #FF5B9FFF

# Toggle switch — enabled state uses medium pink
toggle_enabled_colour = #FF86BCFF

# Toggle switch — disabled state is a warm dark gray for clear off-state visibility
toggle_disabled_colour = #352C31FF

# Toggle switch — slider stays pure white for maximum contrast
toggle_slider_colour = #FFFFFFFF

# Progress bar — filled portion uses medium pink
progress_bar_foreground_colour = #FF86BCFF

# Progress bar — unfilled background is a warm dark gray (more depth than before)
progress_bar_background_colour = #2C2328FF

# Scrollbar — uses primary pink accent
scrollbar_colour = #FFA4CCFF

# LED — success uses green (α ignored by hardware)
led_success = #00FF0000

# LED — failure uses red (α ignored by hardware)
led_failure = #FF000000

# SMDH icon border — matches the primary accent
smdh_icon_border_colour = #FFA4CCFF

# Checkbox border — refined to be more visible against the dark background
checkbox_border_colour = #5E525AFF

# Checkbox check mark — uses primary accent (unchecked = transparent)
checkbox_check_colour = #FFA4CCFF

# Latency/network graph line — slightly lighter pink for better visibility against the dark panel
graph_line_colour = #FFB0D0FF

# Warning text — uses a vivid, slightly deep pink that stands out
warning_colour = #FF6BA8FF

# 'X' close/dismiss buttons — vivid pink for clear destructive-action signalling
x_colour = #FF6BA8FF

# Battery charging indicator — soft light pink glow when plugged in
battery_charging_colour = #FFD1E5FF

# Relative from the .cfg file path to your more image, recommended 20x20
more_image = ./default_data/more_dark.png

# Relative from the .cfg file path to your more image, recommended 26x16
battery_image = ./default_data/battery_dark.png

# Relative from the .cfg file path to your more image, recommended 20x20
search_image = ./default_data/search_dark.png

# Relative from the .cfg file path to your more image, recommended 20x20
settings_image = ./default_data/settings_dark.png

# Relative from the .cfg file path to your more image, recommended 80x80
spinner_image = ./default_data/spinner_dark.png

# Relative from the .cfg file path to your more image, recommended 20x20
random_image = ./default_data/random_dark.png

# Relative from the .cfg file path to your more image, recommended 26x16
battery_charging_image = ./default_data/battery_charging_dark.png

# Background image for top screen, recommended 400x240
# User backgrounds loaded at runtime from /3ds/3hs/backgrounds
